services:
  - type: web
    name: testmaker-rag
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DEFAULT_NUM_QUESTIONS
        value: "8"
      - key: ENABLE_RERANKER
        value: "0"
      - key: MAX_CACHED_TESTS
        value: "20"
